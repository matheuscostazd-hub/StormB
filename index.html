<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ FuteMAX — Transmissões Ao Vivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #12151c; --card: #181c26; --card-hover: #1f2435;
      --border: #252a38; --green: #7fff00; --green-dim: #4db800;
      --text: #e8eaf0; --muted: #6b7490; --accent: #00e5ff; --live-red: #ff3b3b;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

    header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(10,12,16,.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; color: var(--text); cursor: pointer; text-decoration: none; }
    .logo span { color: var(--green); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .live-badge { display: flex; align-items: center; gap: 7px; background: rgba(255,59,59,.12); border: 1px solid rgba(255,59,59,.35); border-radius: 20px; padding: 5px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; font-weight: 700; letter-spacing: 1.5px; color: var(--live-red); text-transform: uppercase; }
    .live-dot { width: 8px; height: 8px; background: var(--live-red); border-radius: 50%; animation: pulse-red 1.4s ease-in-out infinite; }
    @keyframes pulse-red { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    .clock { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 600; color: var(--muted); letter-spacing: 1px; }

    .sync-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(127,255,0,.1); border: 1px solid rgba(127,255,0,.3);
      color: var(--green); border-radius: 20px; padding: 5px 14px;
      font-family: 'Barlow Condensed', sans-serif; font-size: .82rem; font-weight: 700;
      letter-spacing: 1px; cursor: pointer; transition: all .2s; text-transform: uppercase; white-space: nowrap;
    }
    .sync-btn:hover { background: rgba(127,255,0,.2); border-color: var(--green); }
    .sync-btn:disabled { opacity: .5; cursor: not-allowed; }
    .sync-btn svg { width: 13px; height: 13px; }
    .sync-btn.loading svg { animation: spin .8s linear infinite; }

    .status-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 8px 24px; display: flex; align-items: center; gap: 10px;
      font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; color: var(--muted); min-height: 36px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-dot.ok { background: var(--green); }
    .status-dot.loading { background: var(--accent); animation: pulse-blue 1s ease-in-out infinite; }
    .status-dot.error { background: var(--live-red); }
    @keyframes pulse-blue { 0%,100%{opacity:1} 50%{opacity:.3} }
    .last-update { margin-left: auto; color: var(--muted); font-size: .75rem; }

    .filter-bar { padding: 14px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); }
    .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 5px 16px; font-family: 'Barlow', sans-serif; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .18s; white-space: nowrap; }
    .filter-btn:hover, .filter-btn.active { background: var(--green); color: #0a0c10; border-color: var(--green); }
    .search-wrap { position: relative; margin-left: auto; }
    .search-input { background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: .82rem; padding: 6px 16px 6px 34px; outline: none; width: 180px; transition: border-color .18s, width .25s; }
    .search-input:focus { border-color: var(--green); width: 220px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .8rem; pointer-events: none; }

    main { max-width: 1400px; margin: 0 auto; padding: 28px 24px 60px; }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
    .match-count { background: var(--green); color: #0a0c10; border-radius: 10px; padding: 2px 9px; font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 800; }
    .time-group { margin: 28px 0 14px; display: flex; align-items: center; gap: 10px; }
    .time-label { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; }
    .time-line { flex: 1; height: 1px; background: var(--border); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform .18s, border-color .18s, box-shadow .18s; cursor: pointer; display: block; position: relative; }
    .match-card:hover { transform: translateY(-3px); border-color: var(--green-dim); box-shadow: 0 8px 28px rgba(127,255,0,.08); background: var(--card-hover); }
    .match-card:hover .card-arrow { opacity: 1; transform: translateX(0); }
    .thumb-wrap { position: relative; aspect-ratio: 16/9; background: #0d1017; overflow: hidden; }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
    .match-card:hover .thumb-wrap img { transform: scale(1.05); }
    .live-tag { position: absolute; top: 8px; left: 8px; background: var(--live-red); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; font-weight: 800; letter-spacing: 1.5px; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }
    .time-tag { position: absolute; top: 8px; right: 8px; background: rgba(10,12,16,.85); color: var(--accent); font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .card-body { padding: 10px 12px 12px; }
    .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: .95rem; font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-cats { display: flex; flex-wrap: wrap; gap: 4px; }
    .card-cat { font-size: .68rem; font-weight: 600; color: var(--muted); background: rgba(255,255,255,.04); border-radius: 4px; padding: 2px 6px; }
    .card-arrow { position: absolute; bottom: 10px; right: 12px; color: var(--green); font-size: 1rem; opacity: 0; transform: translateX(-6px); transition: all .18s; }
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 1rem; }
    .empty span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .skeleton-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .skeleton-thumb { aspect-ratio: 16/9; background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite; }
    .skeleton-body { padding: 10px 12px 12px; }
    .skeleton-line { height: 12px; border-radius: 6px; background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite; margin-bottom: 8px; }
    .skeleton-line.short { width: 60%; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes spin { to{transform:rotate(360deg)} }

    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.88); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; width: 100%; max-width: 900px; display: flex; flex-direction: column; max-height: 95vh; animation: modal-in .22s ease; }
    @keyframes modal-in { from{opacity:0;transform:scale(.95) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 10px; }
    .modal-live-dot { width: 9px; height: 9px; background: var(--live-red); border-radius: 50%; animation: pulse-red 1.4s ease-in-out infinite; flex-shrink: 0; }
    .modal-close { background: rgba(255,255,255,.07); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s; flex-shrink: 0; }
    .modal-close:hover { background: var(--live-red); color: #fff; border-color: var(--live-red); }
    .player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; flex-shrink: 0; }
    .player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; }
    .player-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: #000; color: var(--muted); font-size: .9rem; z-index: 1; pointer-events: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
    .channel-bar { padding: 12px 18px; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--card); }
    .channel-label { font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; align-self: center; margin-right: 4px; }
    .ch-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 5px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .15s; }
    .ch-btn:hover { border-color: var(--green-dim); color: var(--green); }
    .ch-btn.active { background: var(--green); color: #0a0c10; border-color: var(--green); }
    .ch-error { padding: 8px 18px 12px; font-size: .8rem; color: var(--muted); border-top: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ch-error a { color: var(--accent); text-decoration: none; font-weight: 600; }

    footer { border-top: 1px solid var(--border); padding: 18px 24px; text-align: center; font-size: .78rem; color: var(--muted); }

    @media (max-width: 600px) {
      header { padding: 12px 16px; flex-wrap: wrap; } .clock { display: none; }
      main { padding: 20px 16px 50px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }
      .filter-bar { padding: 12px 16px; }
      .search-wrap { margin-left: 0; width: 100%; }
      .search-input, .search-input:focus { width: 100%; }
      .modal { max-height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" onclick="closeModal()">Fute<span>MAX</span></a>
  <div class="header-right">
    <div class="live-badge"><span class="live-dot"></span> Ao Vivo</div>
    <button class="sync-btn" id="syncBtn" onclick="fetchMatches()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="syncIcon">
        <path d="M21 2v6h-6M3 12a9 9 0 0115-6.7L21 8M3 22v-6h6M21 12a9 9 0 01-15 6.7L3 16"/>
      </svg>
      Sincronizar
    </button>
    <div class="clock" id="clock"></div>
  </div>
</header>

<div class="status-bar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">Aguardando sincronização...</span>
  <span class="last-update" id="lastUpdate"></span>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" class="search-input" id="searchInput" placeholder="Buscar jogo...">
  </div>
</div>

<main>
  <div class="section-header">
    <h1 class="section-title">Transmissões de Hoje</h1>
    <span class="match-count" id="matchCount">0</span>
  </div>
  <div id="matchesGrid"></div>
</main>

<footer>Sincronizado com futemax.repair via Gemini AI • Clique num jogo para assistir aqui mesmo</footer>

<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <span class="modal-live-dot"></span>
        <span id="modalTitle">Carregando...</span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="player-wrap">
      <div class="player-loading" id="playerLoading">
        <div class="spinner"></div>
        <span>Carregando transmissão...</span>
      </div>
      <iframe id="playerIframe" src="" allowfullscreen
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
        onload="iframeLoaded()"></iframe>
    </div>
    <div class="channel-bar" id="channelBar"><span class="channel-label">Canal:</span></div>
    <div class="ch-error" id="chError" style="display:none">
      ⚠️ Se o player não carregar, tente outra opção acima, ou
      <a id="fallbackLink" href="#" target="_blank" rel="noopener">abra em nova aba</a>.
    </div>
  </div>
</div>

<script>
const API_ENDPOINT = '/api/gemini';
let matches = [], activeFilter = 'all', searchQuery = '', currentMatch = null, isFetching = false;

// Clock
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}
updateClock(); setInterval(updateClock, 1000);

function setStatus(type, text) {
  document.getElementById('statusDot').className = 'status-dot ' + type;
  document.getElementById('statusText').textContent = text;
}
function setLastUpdate() {
  document.getElementById('lastUpdate').textContent =
    'Atualizado às ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}
function isLive(hour) {
  const [h,m] = hour.split(':').map(Number);
  const now = new Date(), t = new Date();
  t.setHours(h,m,0,0);
  const diff = (now - t) / 60000;
  return diff >= 0 && diff <= 120;
}

async function fetchMatches() {
  if (isFetching) return;
  isFetching = true;
  const btn = document.getElementById('syncBtn');
  btn.disabled = true; btn.classList.add('loading');
  setStatus('loading', 'Buscando transmissões em futemax.repair...');
  showSkeletons();

  const today = new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});

  const prompt = `Acesse o site https://futemax.repair/ agora e liste TODOS os jogos de futebol disponíveis hoje ${today}.

Para cada jogo encontrado retorne um objeto com:
- title: nome do jogo (ex: "Flamengo x Palmeiras")
- hour: horário HH:MM no horário de Brasília
- img: URL completa da imagem thumbnail do jogo (domínio futemax.repair)
- cats: array de strings com as categorias/campeonatos
- channels: array de URLs dos players embed para assistir ao jogo

Responda SOMENTE com um array JSON válido. Sem texto antes ou depois. Sem blocos de código. Apenas o JSON.
Exemplo: [{"hour":"15:00","title":"Time A x Time B","img":"https://futemax.repair/wp-content/uploads/...jpg","cats":["Brasileirão"],"channels":["https://player1.com","https://player2.com"]}]
Se não encontrar nada retorne: []`;

  try {
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const raw = (data.text || '').trim();

    let parsed = [];
    try {
      const jsonMatch = raw.match(/\[[\s\S]*\]/);
      if (jsonMatch) parsed = JSON.parse(jsonMatch[0]);
    } catch(e) { console.error('Parse error:', e, raw); }

    if (Array.isArray(parsed) && parsed.length > 0) {
      matches = parsed;
      setStatus('ok', `${matches.length} transmissões carregadas de futemax.repair`);
      setLastUpdate();
      updateFilters();
      render();
    } else {
      if (!matches.length) {
        setStatus('error', 'Nenhuma transmissão encontrada. Tente sincronizar novamente.');
        document.getElementById('matchesGrid').innerHTML =
          `<div class="empty"><span>⚽</span>Nenhuma transmissão encontrada.<br><small style="font-size:.8rem;margin-top:8px;display:block">Clique em "Sincronizar" para tentar novamente.</small></div>`;
        document.getElementById('matchCount').textContent = '0';
      } else {
        setStatus('ok', `${matches.length} transmissões (cache)`);
        render();
      }
    }
  } catch(err) {
    console.error(err);
    setStatus('error', 'Erro: ' + err.message);
    if (!matches.length) {
      document.getElementById('matchesGrid').innerHTML =
        `<div class="empty"><span>⚠️</span>Erro ao buscar transmissões.<br><small style="font-size:.8rem;margin-top:8px;display:block">${err.message}</small></div>`;
      document.getElementById('matchCount').textContent = '0';
    } else render();
  } finally {
    isFetching = false;
    btn.disabled = false; btn.classList.remove('loading');
  }
}

function showSkeletons() {
  let html = '<div class="skeleton-grid">';
  for (let i=0;i<12;i++)
    html += `<div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>`;
  document.getElementById('matchesGrid').innerHTML = html + '</div>';
  document.getElementById('matchCount').textContent = '...';
}

function updateFilters() {
  const allCats = new Set();
  matches.forEach(m => (m.cats||[]).forEach(c => allCats.add(c)));
  const bar = document.querySelector('.filter-bar');
  bar.querySelectorAll('.filter-btn:not([data-filter="all"])').forEach(b => b.remove());
  const search = bar.querySelector('.search-wrap');
  allCats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.dataset.filter = cat; btn.textContent = cat;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); activeFilter = cat; render();
    });
    bar.insertBefore(btn, search);
  });
}

function getFiltered() {
  return matches.filter(m => {
    const f = activeFilter === 'all' || (m.cats||[]).includes(activeFilter);
    const s = !searchQuery || (m.title||'').toLowerCase().includes(searchQuery.toLowerCase());
    return f && s;
  });
}

function render() {
  const grid = document.getElementById('matchesGrid');
  const filtered = getFiltered();
  document.getElementById('matchCount').textContent = filtered.length;
  if (!filtered.length) { grid.innerHTML = `<div class="empty"><span>⚽</span>Nenhuma transmissão encontrada.</div>`; return; }
  const groups = {};
  filtered.forEach(m => { (groups[m.hour] = groups[m.hour]||[]).push(m); });
  const fallback = 'https://futemax.repair/wp-content/uploads/2026/01/sportv.png';
  let html = '';
  Object.keys(groups).sort().forEach(hour => {
    const live = groups[hour].some(m => isLive(m.hour));
    html += `<div class="time-group"><span class="time-label">${live?'🔴 ':''}${hour}</span><div class="time-line"></div></div><div class="grid">`;
    groups[hour].forEach(m => {
      const idx = matches.indexOf(m);
      const cats = (m.cats||[]).map(c=>`<span class="card-cat">${c}</span>`).join('');
      html += `<div class="match-card" onclick="openMatch(${idx})" tabindex="0" role="button" onkeydown="if(event.key==='Enter')openMatch(${idx})">
        <div class="thumb-wrap">
          <img src="${m.img||fallback}" alt="${m.title||''}" loading="lazy" onerror="this.src='${fallback}'">
          ${isLive(m.hour)?'<span class="live-tag">● AO VIVO</span>':''}
          <span class="time-tag">${m.hour||''}</span>
        </div>
        <div class="card-body">
          <div class="card-title">${m.title||'Sem título'}</div>
          <div class="card-cats">${cats}</div>
        </div>
        <span class="card-arrow">▶</span>
      </div>`;
    });
    html += '</div>';
  });
  grid.innerHTML = html;
}

function openMatch(idx) {
  currentMatch = matches[idx];
  document.getElementById('modalTitle').textContent = currentMatch.title||'Transmissão';
  buildChannelBar(); loadChannel(0);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function buildChannelBar() {
  const bar = document.getElementById('channelBar');
  bar.innerHTML = '<span class="channel-label">Canal:</span>';
  (currentMatch.channels||[]).forEach((_,i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn'+(i===0?' active':'');
    btn.textContent = `Opção ${i+1}`;
    btn.onclick = () => loadChannel(i);
    bar.appendChild(btn);
  });
}
function loadChannel(idx) {
  const url = (currentMatch.channels||[])[idx]; if(!url) return;
  document.querySelectorAll('.ch-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.getElementById('playerLoading').style.display = 'flex';
  document.getElementById('chError').style.display = 'none';
  document.getElementById('fallbackLink').href = url;
  document.getElementById('playerIframe').src = url;
}
function iframeLoaded() {
  document.getElementById('playerLoading').style.display = 'none';
  setTimeout(() => { document.getElementById('chError').style.display = 'flex'; }, 3000);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('playerIframe').src = '';
  document.getElementById('chError').style.display = 'none';
  document.body.style.overflow = '';
  currentMatch = null;
}
function overlayClick(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
document.querySelector('.filter-btn[data-filter="all"]').addEventListener('click', () => {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
  activeFilter = 'all'; render();
});
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; render(); });

// Auto-sync ao abrir e a cada 5 minutos
fetchMatches();
setInterval(fetchMatches, 5 * 60 * 1000);
</script>
</body>
</html>
